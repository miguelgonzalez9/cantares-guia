name: Deploy PWA to GitHub Pages

# Publica SOLO inmersive_app/app/public (la PWA estática). El resto del repo
# —datos crudos, scripts R/Python, ortofoto— NO se sube al sitio.

on:
  push:
    branches: [main]
    paths:
      - 'inmersive_app/app/public/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; cancela los anteriores en curso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: inmersive_app/app/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
